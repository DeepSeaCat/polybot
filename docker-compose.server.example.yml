services:
  polybot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polybot-copybot
    restart: unless-stopped
    command: ["python", "poly_copybot.py", "run", "--config", "/app/configs/server.copybot.json"]
    ports:
      - "8088:8088"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./configs/server.copybot.json:/app/configs/server.copybot.json:ro

